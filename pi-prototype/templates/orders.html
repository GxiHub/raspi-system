<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UberEats 訂單紀錄</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

  .header {
    background: #06c167;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .subtitle { font-size: 13px; opacity: 0.85; }
  .header a { color: white; text-decoration: none; font-size: 13px;
               margin-left: auto; background: rgba(255,255,255,0.2);
               padding: 6px 14px; border-radius: 20px; }
  .header a:hover { background: rgba(255,255,255,0.35); }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
  }
  .count-badge {
    background: #06c167; color: white;
    font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 12px;
  }
  .refresh-btn {
    margin-left: auto;
    background: #f3f4f6; border: none; cursor: pointer;
    padding: 7px 16px; border-radius: 8px; font-size: 13px;
    color: #374151; transition: background .2s;
  }
  .refresh-btn:hover { background: #e5e7eb; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  .card-meta {
    padding: 12px 16px;
    border-bottom: 1px solid #f3f4f6;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-time { font-size: 12px; color: #6b7280; }
  .card-id {
    font-size: 11px; font-weight: 600;
    background: #f0fdf4; color: #16a34a;
    padding: 2px 8px; border-radius: 10px;
  }
  .card-img {
    width: 100%;
    display: block;
    background: #fafafa;
  }
  .card-footer {
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #9ca3af;
  }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: #9ca3af;
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 1000;
    justify-content: center; align-items: flex-start;
    padding: 40px 20px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px;
    max-width: 540px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    background: #06c167; color: white;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 { font-size: 16px; }
  .modal-close {
    background: rgba(255,255,255,0.2); border: none;
    color: white; font-size: 18px; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 0; }
  .modal-body img { width: 100%; display: block; }
  .modal-info {
    padding: 16px 20px; display: grid;
    grid-template-columns: 1fr 1fr; gap: 8px;
    border-top: 1px solid #f3f4f6;
  }
  .info-item label { font-size: 11px; color: #9ca3af; display: block; }
  .info-item span { font-size: 13px; font-weight: 500; color: #111; }

  .auto-refresh-indicator {
    font-size: 11px; color: #9ca3af;
    display: flex; align-items: center; gap: 4px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%;
         background: #06c167; animation: pulse 2s infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 UberEats 訂單紀錄</h1>
    <div class="subtitle">即時捕捉每筆列印訂單</div>
  </div>
  <a href="/">← 返回控制台</a>
</div>

<div class="toolbar">
  <span>共 <span id="count" class="count-badge">0</span> 筆訂單</span>
  <div class="auto-refresh-indicator">
    <div class="dot"></div> 每 15 秒自動更新
  </div>
  <button class="refresh-btn" onclick="loadOrders()">↻ 重新整理</button>
</div>

<div class="grid" id="grid">
  <div class="empty">
    <div class="icon">🖨️</div>
    <p>載入中...</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">訂單詳情</h2>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <img id="modal-img" src="" alt="收據">
    </div>
    <div class="modal-info" id="modal-info"></div>
  </div>
</div>

<script>
let orders = [];

async function loadOrders() {
  try {
    const res = await fetch('/api/orders');
    orders = await res.json();
    render(orders);
  } catch(e) {
    console.error(e);
  }
}

function render(data) {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = data.length;

  if (!data.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">🖨️</div><p>尚無訂單紀錄，等待第一筆列印...</p></div>';
    return;
  }

  grid.innerHTML = data.map(o => `
    <div class="card" onclick="showOrder(${o.id})">
      <div class="card-meta">
        <span class="card-time">${o.received_at}</span>
        ${o.job_id ? `<span class="card-id">${o.job_id}</span>` : ''}
      </div>
      <img class="card-img" src="/static/${o.image_path}" alt="收據" loading="lazy">
      <div class="card-footer">
        <span>${o.tablet_ip || '-'}</span>
        <span>${(o.raw_size/1024).toFixed(1)} KB</span>
      </div>
    </div>
  `).join('');
}

function showOrder(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('modal-title').textContent = `訂單 ${o.job_id || '#'+o.id}`;
  document.getElementById('modal-img').src = `/static/${o.image_path}`;
  document.getElementById('modal-info').innerHTML = `
    <div class="info-item"><label>時間</label><span>${o.received_at}</span></div>
    <div class="info-item"><label>Job ID</label><span>${o.job_id || '-'}</span></div>
    <div class="info-item"><label>平板 IP</label><span>${o.tablet_ip || '-'}</span></div>
    <div class="info-item"><label>資料大小</label><span>${(o.raw_size/1024).toFixed(1)} KB</span></div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
